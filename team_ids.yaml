# ============================================================================
# Canonical team name registry.
#
# Format:  league -> { alias: canonical_name }
# The canonical name is the one stored in team_ratings.pkl (Transfermarkt).
# All aliases (from API-Football fixtures, corners profiles, etc.) map to it.
#
# To add a new team: add a line under the right league.
# To find mismatches: run  python team_registry.py --check
# ============================================================================

